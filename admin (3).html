<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO Market - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --black:#000; --white:#fff; --pink:#FF87A6; --purple:#A293FF; --lime:#D0FA49; --orange:#FF9500; --cyan:#18DAEB; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--black); color:var(--white); font-family:'Figtree',sans-serif; min-height:100vh; }
.lock-screen { position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:999; display:flex; align-items:center; justify-content:center; }
.lock-box { background:#0f0f0f; border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:36px 28px; width:100%; max-width:340px; text-align:center; }
.lock-logo { width:44px; margin:0 auto 14px; display:block; }
.lock-title { font-family:'Rubik',sans-serif; font-weight:900; font-size:20px; margin-bottom:6px; }
.lock-sub { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:22px; }
.lock-input { width:100%; background:rgba(0,0,0,0.5); border:1.5px solid rgba(255,255,255,0.12); border-radius:11px; padding:13px 16px; color:var(--white); font-family:'Figtree',sans-serif; font-size:16px; outline:none; text-align:center; letter-spacing:3px; transition:border-color 0.2s; }
.lock-input:focus { border-color:var(--pink); }
.lock-btn { width:100%; background:var(--pink); color:var(--black); border:none; border-radius:11px; padding:13px; font-family:'Rubik',sans-serif; font-weight:900; font-size:15px; cursor:pointer; margin-top:12px; }
.lock-btn:hover { opacity:0.88; }
.lock-error { color:var(--orange); font-size:12px; margin-top:8px; display:none; }
.container { max-width:560px; margin:0 auto; padding:0 20px 60px; }
.header { display:flex; align-items:center; justify-content:space-between; padding:24px 0 20px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:28px; }
.logo-area { display:flex; align-items:center; gap:10px; }
.logo-img { width:34px; height:auto; }
.logo-text { font-family:'Rubik',sans-serif; font-weight:900; font-size:18px; }
.logo-text span { color:var(--pink); }
.admin-badge { background:rgba(255,149,0,0.15); border:1px solid rgba(255,149,0,0.3); border-radius:8px; padding:4px 10px; font-size:11px; font-weight:700; color:var(--orange); font-family:'Rubik',sans-serif; letter-spacing:1px; }
.card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:24px; margin-bottom:20px; position:relative; overflow:hidden; }
.card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,var(--pink),var(--purple),var(--cyan)); }
.card-title { font-family:'Rubik',sans-serif; font-weight:900; font-size:17px; margin-bottom:16px; }
.event-info { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.info-chip { background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:8px 14px; font-size:13px; }
.info-chip span { color:rgba(255,255,255,0.4); font-size:11px; display:block; margin-bottom:2px; font-family:'Rubik',sans-serif; letter-spacing:0.5px; text-transform:uppercase; }
.info-chip strong { font-family:'Rubik',sans-serif; font-weight:700; color:var(--lime); }
.input-label { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-bottom:6px; display:block; font-family:'Rubik',sans-serif; }
.price-wrap { position:relative; margin-bottom:16px; }
.price-prefix { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--lime); font-family:'Rubik',sans-serif; font-weight:700; font-size:16px; pointer-events:none; }
.input-field { width:100%; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:11px; padding:13px 15px; color:var(--white); font-family:'Figtree',sans-serif; font-size:16px; outline:none; transition:border-color 0.2s; }
.input-field:focus { border-color:var(--pink); }
.input-field.pl { padding-left:28px; }
.input-field::placeholder { color:rgba(255,255,255,0.18); }
.resolve-btn { width:100%; background:var(--lime); color:var(--black); border:none; border-radius:11px; padding:14px; font-family:'Rubik',sans-serif; font-weight:900; font-size:15px; cursor:pointer; transition:opacity 0.2s,transform 0.15s; }
.resolve-btn:hover { opacity:0.88; transform:translateY(-1px); }
.resolve-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
.winner-preview { background:linear-gradient(135deg,rgba(255,135,166,0.12),rgba(162,147,255,0.1)); border:1.5px solid var(--pink); border-radius:16px; padding:20px; text-align:center; margin-top:16px; display:none; animation:fadeIn 0.4s ease; }
.winner-preview.show { display:block; }
.crown { font-size:32px; display:block; margin-bottom:6px; }
.w-label { font-family:'Rubik',sans-serif; font-weight:900; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--pink); margin-bottom:8px; }
.w-nick { font-family:'Rubik',sans-serif; font-weight:900; font-size:30px; color:var(--white); margin-bottom:4px; }
.w-detail { font-size:13px; color:rgba(255,255,255,0.45); }
.w-detail strong { color:var(--lime); }
.confirm-btn { background:var(--pink); color:var(--black); border:none; border-radius:10px; padding:12px 28px; font-family:'Rubik',sans-serif; font-weight:900; font-size:14px; cursor:pointer; margin-top:14px; transition:opacity 0.2s; }
.confirm-btn:hover { opacity:0.88; }
.lb-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.lb-row:last-child { border-bottom:none; }
.lb-rank { font-family:'Rubik',sans-serif; font-weight:700; font-size:13px; color:rgba(255,255,255,0.25); width:22px; text-align:center; flex-shrink:0; }
.lb-nick { flex:1; font-weight:600; font-size:14px; }
.lb-price { font-family:'Rubik',sans-serif; font-weight:700; font-size:14px; color:var(--lime); flex-shrink:0; }
.lb-diff { font-size:12px; width:70px; text-align:right; flex-shrink:0; font-family:'Rubik',sans-serif; font-weight:700; }
.diff-good { color:var(--lime); }
.diff-ok { color:var(--orange); }
.diff-bad { color:rgba(255,255,255,0.25); }
.already-resolved { background:rgba(208,250,73,0.08); border:1px solid rgba(208,250,73,0.2); border-radius:12px; padding:14px 16px; font-size:13px; color:var(--lime); font-weight:600; text-align:center; margin-bottom:16px; display:none; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--white); color:var(--black); font-family:'Rubik',sans-serif; font-weight:700; font-size:14px; padding:11px 20px; border-radius:11px; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index:100; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
.loading { text-align:center; padding:20px; color:rgba(255,255,255,0.25); font-size:13px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

      <div class="logo-text"><span>XO</span> MARKET</div>
    </div>
    <div class="admin-badge">ADMIN</div>
  </div>

  <div class="card">
    <div class="card-title">Resolve Event</div>
    <div class="event-info" id="eventInfo">
      <div class="info-chip"><span>Event</span><strong id="chipEvent">week_3_gold</strong></div>
      <div class="info-chip"><span>Entries</span><strong id="chipEntries">-</strong></div>
      <div class="info-chip"><span>Status</span><strong id="chipStatus">-</strong></div>
    </div>
    <div class="already-resolved" id="alreadyResolved"></div>
    <label class="input-label">Actual Gold Price (XAUUSD)</label>
    <div class="price-wrap">
      <span class="price-prefix">$</span>
      <input class="input-field pl" id="actualPrice" type="number" placeholder="3,248.30" step="0.01" min="1">
    </div>
    <button class="resolve-btn" id="resolveBtn" onclick="findWinner()">Find Winner</button>
    <div class="winner-preview" id="winnerPreview">
      <span class="crown">👑</span>
      <div class="w-label">King Predictor for the Week</div>
      <div class="w-nick" id="previewNick"></div>
      <div class="w-detail">Guess: <strong id="previewGuess"></strong> · Actual: <strong id="previewActual" style="color:var(--cyan)"></strong> · Diff: <strong id="previewDiff" style="color:var(--orange)"></strong></div>
      <button class="confirm-btn" onclick="confirmWinner()">Confirm & Publish 🚀</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">All Predictions</div>
    <div id="adminLbList"><div class="loading">Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://turovujkxcsoscyjaytv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1cm92dWpreGNzb3NjeWpheXR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NjI4NDgsImV4cCI6MjA5NDIzODg0OH0.GkHy4xZjYlfKeI6iIL09uKOemwLG8k2TLRQAniTydio';
const EVENT_ID = 'week_3_gold';
const ADMIN_PASSWORD = 'xoking2026';

let allEntries = [];
let pendingWinner = null;

function sbH() {
  return { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };
}
const fmtP = p => Number(p).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc  = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function checkPassword() {
  const pwd = document.getElementById('pwdInput').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadData();
  } else {
    document.getElementById('lockError').style.display = 'block';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}
document.addEventListener('DOMContentLoaded', function() {
  var inp = document.getElementById('pwdInput');
  if (inp) {
    inp.addEventListener('keydown', function(e) { 
      if(e.key === 'Enter') checkPassword(); 
    });
    inp.focus();
  }
});

async function loadData() {
  try {
    const [entriesRes, eventRes] = await Promise.all([
      fetch(SUPABASE_URL + '/rest/v1/xo_predictions?event_id=eq.' + EVENT_ID + '&order=submitted_at.asc&select=nick,price,submitted_at', { headers: sbH() }),
      fetch(SUPABASE_URL + '/rest/v1/xo_events?event_id=eq.' + EVENT_ID + '&select=*', { headers: sbH() })
    ]);
    allEntries = await entriesRes.json();
    const events = await eventRes.json();
    const event = events[0];

    document.getElementById('chipEntries').textContent = allEntries.length;

    if (event && event.winner_nick) {
      document.getElementById('chipStatus').textContent = 'Resolved';
      document.getElementById('chipStatus').style.color = 'var(--lime)';
      const ar = document.getElementById('alreadyResolved');
      ar.style.display = 'block';
      ar.innerHTML = '✅ Already resolved · Winner: <strong>' + esc(event.winner_nick) + '</strong> · Actual price: <strong>$' + fmtP(event.actual_price) + '</strong>';
      document.getElementById('resolveBtn').textContent = 'Re-resolve';
    } else {
      document.getElementById('chipStatus').textContent = 'Pending';
      document.getElementById('chipStatus').style.color = 'var(--orange)';
    }

    renderAdminLb(allEntries, null);
  } catch(e) {
    showToast('Error loading data');
  }
}

function findWinner() {
  const actual = parseFloat(document.getElementById('actualPrice').value);
  if (!actual || actual <= 0) { showToast('Enter the actual price!'); return; }
  if (!allEntries.length) { showToast('No entries found!'); return; }

  const winner = allEntries.reduce((best, e) =>
    Math.abs(e.price - actual) < Math.abs(best.price - actual) ? e : best
  );
  const diff = Math.abs(winner.price - actual);
  pendingWinner = { nick: winner.nick, price: winner.price, actual, diff };

  document.getElementById('previewNick').textContent = '@' + winner.nick;
  document.getElementById('previewGuess').textContent = '$' + fmtP(winner.price);
  document.getElementById('previewActual').textContent = '$' + fmtP(actual);
  document.getElementById('previewDiff').textContent = '$' + fmtP(diff);
  document.getElementById('winnerPreview').classList.add('show');

  renderAdminLb(allEntries, actual);
}

async function confirmWinner() {
  if (!pendingWinner) return;
  const btn = document.querySelector('.confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Publishing...';

  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/xo_events?event_id=eq.' + EVENT_ID, {
      method: 'PATCH',
      headers: { ...sbH(), 'Prefer': 'return=representation' },
      body: JSON.stringify({
        actual_price: pendingWinner.actual,
        winner_nick: pendingWinner.nick,
        winner_price: pendingWinner.price,
        resolved_at: new Date().toISOString()
      })
    });
    if (!r.ok) throw new Error('patch failed');
    showToast('Winner published! 👑 @' + pendingWinner.nick);
    setTimeout(() => loadData(), 1000);
  } catch(e) {
    showToast('Error publishing winner');
    btn.disabled = false;
    btn.textContent = 'Confirm & Publish 🚀';
  }
}

function renderAdminLb(entries, actual) {
  if (!entries.length) {
    document.getElementById('adminLbList').innerHTML = '<div class="loading">No entries yet</div>';
    return;
  }
  let sorted = [...entries];
  if (actual) {
    sorted.sort((a,b) => Math.abs(a.price-actual) - Math.abs(b.price-actual));
  }
  document.getElementById('adminLbList').innerHTML = sorted.map((e,i) => {
    const diff = actual ? Math.abs(e.price - actual) : null;
    const diffClass = diff === null ? '' : diff < 10 ? 'diff-good' : diff < 50 ? 'diff-ok' : 'diff-bad';
    const diffText = diff !== null ? '$' + fmtP(diff) : '';
    return '<div class="lb-row">' +
      '<span class="lb-rank">' + (actual && i===0 ? '👑' : i+1) + '</span>' +
      '<span class="lb-nick">' + esc(e.nick) + '</span>' +
      '<span class="lb-price">$' + fmtP(e.price) + '</span>' +
      '<span class="lb-diff ' + diffClass + '">' + diffText + '</span>' +
      '</div>';
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
